# FiberGuard Session policy — TESTNET
#
# Same three demo apps as fiberguard.yml, but the RUSD asset is wired to the REAL
# Fiber testnet UDT type script (from a testnet fnn node's node_info.udt_cfg_infos),
# so this policy is meant for a gateway whose --upstream points at a real testnet
# Fiber node (fnn), not the mock.
#
# Reads (node.read, channels.read_summary) and invoice.create work against a
# freshly-booted node with no funds. A *successful* payment additionally needs a
# funded channel with outbound liquidity — see scripts/testnet.sh and
# docs/testnet.md.

assets:
  RUSD:
    decimals: 8
    # Real RUSD on CKB testnet (nervosnetwork/fiber testnet config + node_info).
    udt_type_script:
      code_hash: "0x1142755a044bf2ee358cba9f2da187ce928c91cd4dc8692ded0337efa677d21a"
      hash_type: type
      args: "0x878fcc6f1f08d48e87bb1c3b3d5083f23f8a39c5d5c764f253b55b998526439b"
  CKB:
    decimals: 8
    native: true

apps:
  agent-demo:
    name: "Agent Demo"
    origins:
      - "http://localhost:3001"
    allow:
      - action: "payment.pay_invoice"
        assets: ["RUSD"]
        max_amount_per_payment: "1"
        daily_limit: "5"
        require_approval: true
        expires_in: "10m"
      - action: "payment.read_own"
    deny:
      - action: "channel.open"
      - action: "channel.close"
      - action: "peer.connect"
      - action: "payments.read_all"

  merchant-demo:
    name: "Merchant Demo"
    origins:
      - "http://localhost:3002"
    allow:
      - action: "invoice.create"
        assets: ["RUSD", "CKB"]
        max_amount_per_invoice: "100"
        require_approval: false
      - action: "payment.read_own"
    deny:
      - action: "channel.open"
      - action: "channel.close"

  dashboard-demo:
    name: "Read-only Dashboard"
    origins:
      - "http://localhost:3003"
    allow:
      - action: "node.read"
      - action: "channels.read_summary"
      - action: "payment.read_own"
    deny:
      - action: "payment.pay_invoice"
      - action: "invoice.create"
      - action: "channel.open"
      - action: "channel.close"
      - action: "peer.connect"
